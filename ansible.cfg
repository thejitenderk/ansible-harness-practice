[defaults]
inventory = inventories/dev         # default inventory
roles_path = roles                  # roles folder
host_key_checking = False           # SSH host key check disable (WinRM me zaruri)
retry_files_enabled = False         # retry files create na ho
forks = 10                          # parallel execution
gathering = smart

[privilege_escalation]
become = False

[winrm]
transport = basic                   # or ntlm if needed
read_timeout_sec = 60
operation_timeout_sec = 20

[colors]
enabled = True


