name: Ansible Deploy

on:
  workflow_dispatch:
    inputs:
      inventory:
        description: Inventory path
        required: true
        default: inventories/qa
      playbook:
        description: Playbook
        required: true
        default: deploy.yml

env:
  ANSIBLE_USER: ${{ secrets.ANSIBLE_USER }}
  ANSIBLE_PASSWORD: ${{ secrets.ANSIBLE_PASSWORD }}

jobs:
  ansible:
    runs-on: ubuntu-latest

    container:
      image: pad92/ansible-alpine:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          ansible-galaxy collection install -r requirements.yml

      - name: Test inventory parsing
        run: ansible-inventory -i "${{ github.event.inputs.inventory }}" --list

      - name: Sanity Check - Windows Connectivity
        run: |
          ansible-playbook playbooks/sanity.yml -vvv \
            -i "${{ github.event.inputs.inventory }}" \
            -e "ansible_connection=winrm \
                ansible_user=$ANSIBLE_USER \
                ansible_password=$ANSIBLE_PASSWORD \
                ansible_winrm_transport=basic \
                ansible_winrm_port=5985 \
                ansible_winrm_scheme=http"

      - name: Optional Ansible Lint
        if: true
        run: ansible-lint playbooks/

      - name: Dry Run (Check Mode)
        run: |
          ansible-playbook "playbooks/${{ github.event.inputs.playbook }}" -vvv \
            -i "${{ github.event.inputs.inventory }}" \
            -e "ansible_connection=winrm \
                ansible_user=$ANSIBLE_USER \
                ansible_password=$ANSIBLE_PASSWORD \
                ansible_winrm_transport=basic \
                ansible_winrm_port=5985 \
                ansible_winrm_scheme=http" \
            --check

      - name: Run Playbook (Deploy)
        if: success()
        run: |
          ansible-playbook \
            -i "${{ github.event.inputs.inventory }}" \
            "playbooks/${{ github.event.inputs.playbook }}" \
            -e "ansible_connection=winrm \
                ansible_user=$ANSIBLE_USER \
                ansible_password=$ANSIBLE_PASSWORD \
                ansible_winrm_transport=basic \
                ansible_winrm_port=5985 \
                ansible_winrm_scheme=http"