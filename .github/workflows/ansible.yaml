name: Ansible Deploy

on:
  workflow_dispatch:
    inputs:
      inventory:
        description: Inventory path
        required: true
        default: inventories/qa
      playbook:
        description: Playbook
        required: true
        default: deploy.yml

jobs:
  ansible:
    runs-on: ubuntu-latest

    container:
      image: pad92/ansible-alpine:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install WinRM deps
        run: pip install pywinrm requests requests-ntlm

      - name: Run Playbook
        run: |
          ansible-playbook \
            -i "${{ github.event.inputs.inventory }}" \
            "playbooks/${{ github.event.inputs.playbook }}"
