name: Ansible Deploy

on:
  workflow_dispatch:
    inputs:
      inventory:
        description: 'Inventory path (e.g. inventories/qa)'
        required: true
        default: 'inventories/qa'
      playbook:
        description: 'Playbook name (e.g. deploy.yml)'
        required: true
        default: 'deploy.yml'

jobs:
  ansible:
    runs-on: ubuntu-latest

    container:
      image: pad92/ansible-alpine:latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show Ansible version
        run: ansible --version

      - name: Run Playbook
        run: |
          ansible-playbook \
            -i "${{ github.event.inputs.inventory }}" \
            "playbooks/${{ github.event.inputs.playbook }}"
          
