name: Ansible Deploy

on:
  workflow_dispatch:
    inputs:
      inventory:
        description: Inventory path
        required: true
        default: inventories/qa
      playbook:
        description: Playbook
        required: true
        default: deploy.yml

env:
  ANSIBLE_USER: ${{ secrets.ANSIBLE_USER }}
  ANSIBLE_PASSWORD: ${{ secrets.ANSIBLE_PASSWORD }}

jobs:
  ansible:
    runs-on: ubuntu-latest

    container:
      image: pad92/ansible-alpine:latest


    steps:
      - uses: actions/checkout@v4

      - name: Install WinRM deps
        run: pip install pywinrm requests requests-ntlm

      - name: Test inventory parsing
        run: ansible-inventory -i inventories/qa --list
      - name: Test connection
        env:
          ANSIBLE_USER: ${{ secrets.ANSIBLE_USER }}
          ANSIBLE_PASSWORD: ${{ secrets.ANSIBLE_PASSWORD }}
        run: ansible windows -i inventories/qa -m win_ping

      - name: Run Playbook
        run: |
          ansible-playbook \
            -i "${{ github.event.inputs.inventory }}" \
            "playbooks/${{ github.event.inputs.playbook }}"
