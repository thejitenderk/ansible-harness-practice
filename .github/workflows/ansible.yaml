name: Ansible Deploy

on:
  workflow_dispatch:
    inputs:
      inventory:
        description: 'Inventory path (e.g. inventories/staging/hosts.yml)'
        required: true
        default: 'inventories/qa/hosts.yml'
      playbook:
        description: 'Playbook name (e.g. deploy.yml)'
        required: true
        default: 'deploy.yml'

jobs:
  ansible:
    name: Run Ansible
    runs-on: ubuntu-latest
    container:
      image: alpine/ansible:2.20.0

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: apk add --no-cache sshpass        # alpine based image hai
      
      - name: Debug sshpass
        run: |
          which sshpass
          sshpass -V
          echo "Testing SSH connection..."
          sshpass -p '${{ secrets.ANSIBLE_PASSWORD }}' ssh -o StrictHostKeyChecking=no -o PreferredAuthentications=password ${{ secrets.ANSIBLE_USER }}@4.194.41.194 echo "connected"

      - name: Run Playbook
        run: |
          export SSHPASS="${{ secrets.ANSIBLE_PASSWORD }}"
          ansible-playbook \
            -i ${{ github.event.inputs.inventory }} \
            playbooks/${{ github.event.inputs.playbook }} \
            --extra-vars "ansible_user=${{ secrets.ANSIBLE_USER }} ansible_password=${{ secrets.ANSIBLE_PASSWORD }} ansible_become_password=${{ secrets.ANSIBLE_PASSWORD }}" \
            -e "ansible_ssh_common_args='-o PreferredAuthentications=password -o PubkeyAuthentication=no -o StrictHostKeyChecking=no'" \
            -v