name: Ansible Deploy

on:
  workflow_dispatch:
    inputs:
      inventory:
        description: Inventory path
        required: true
        default: inventories/qa
      # playbook:
      #   description: Playbook
      #   required: true
      #   default: deploy.yml
      host_group:
        description: Target host group
        required: false
        default: all

env:
  ANSIBLE_USER: ${{ secrets.ANSIBLE_USER }}
  ANSIBLE_PASSWORD: ${{ secrets.ANSIBLE_PASSWORD }}

jobs:
  ansible:
    runs-on: ubuntu-latest

    container:
      image: pad92/ansible-alpine:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          ansible-galaxy collection install -r requirements.yml

      - name: Test inventory parsing
        run: ansible-inventory -l "${{ github.event.inputs.host_group }}" -i "${{ github.event.inputs.inventory }}" --list

      - name: Check env vars exist
        run: |
          echo "User set: $( [ -n "$ANSIBLE_USER" ] && echo YES || echo NO )"
          echo "Pass set: $( [ -n "$ANSIBLE_PASSWORD" ] && echo YES || echo NO )"
    
      - name: Sanity Check - Windows Connectivity
        run: |
          ansible-playbook playbooks/sanity.yml -vvv \
            -l "${{ github.event.inputs.host_group }}" \
            -i "${{ github.event.inputs.inventory }}"
  

